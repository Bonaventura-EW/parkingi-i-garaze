# Tymczasowy test: czy Otodom odpowiada z runnera GitHub Actions
# (weryfikacja notatki o blokadzie anty-botowej w scraper/scrape.py).
name: Otodom access test

on:
  push:
    branches: [claude/pin-location-parser-z2qpzr]
  workflow_dispatch: {}

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Probe otodom.pl
        run: |
          pip install requests
          python3 - <<'EOF'
          import re
          import requests

          UA = ("Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 "
                "(KHTML, like Gecko) Chrome/124.0 Safari/537.36")
          for url in [
              "https://www.otodom.pl/pl/wyniki/sprzedaz/garaz/lubelskie/lublin/lublin/lublin",
              "https://www.otodom.pl/pl/wyniki/wynajem/garaz/lubelskie/lublin/lublin/lublin",
          ]:
              try:
                  r = requests.get(url, headers={"User-Agent": UA}, timeout=20)
                  links = set(re.findall(r'href="(/pl/oferta/[^"]+)"', r.text))
                  print(f"{url} -> HTTP {r.status_code}, {len(r.text)} B, "
                        f"{len(links)} linkow ofert")
                  for l in sorted(links)[:5]:
                      print("   ", l[:110])
              except Exception as e:
                  print(f"{url} -> ERROR: {e}")
          EOF
